services:
  app:
    build: .
    ports:
      - "5050:5050"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5050/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
